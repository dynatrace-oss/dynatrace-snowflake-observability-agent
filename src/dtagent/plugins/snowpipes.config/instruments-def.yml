attributes:
  snowflake.pipe.definition:
    __context_names:
      - snowpipes
    __example: "COPY INTO MY_DB.MY_SCHEMA.TARGET_TABLE FROM @MY_DB.MY_SCHEMA.MY_STAGE"
    __description: The pipe's COPY statement.
  snowflake.pipe.invalid_reason:
    __context_names:
      - snowpipes
    __example: ""
    __description: Reason the pipe is in an invalid state.
  snowflake.pipe.notification_channel:
    __context_names:
      - snowpipes
    __example: "arn:aws:sqs:us-east-1:123456789012:sf-snowpipe-AIDAEXAMPLE-pipeId"
    __description: Cloud notification channel URL.
  snowflake.pipe.created_on:
    __context_names:
      - snowpipes
    __example: "2025-01-15 10:30:00.000 Z"
    __description: Pipe creation timestamp.
  snowflake.pipe.execution_state:
    __context_names:
      - snowpipes
    __example: RUNNING
    __description: Raw execution state from SYSTEM$PIPE_STATUS.
  snowflake.pipe.last_ingested_timestamp:
    __context_names:
      - snowpipes
    __example: "2025-03-12 08:58:41.695 Z"
    __description: Most recent file ingestion timestamp.
  snowflake.pipe.last_received_message_timestamp:
    __context_names:
      - snowpipes
    __example: "2025-03-12 08:57:30.000 Z"
    __description: Most recent event notification timestamp.
  snowflake.pipe.oldest_file_timestamp:
    __context_names:
      - snowpipes
    __example: "2025-03-12 08:50:00.000 Z"
    __description: Timestamp of oldest pending file.
  snowflake.copy.file_name:
    __context_names:
      - snowpipes_copy_history
    __example: "data/file_20250312.csv.gz"
    __description: Source file name.
  snowflake.copy.stage_location:
    __context_names:
      - snowpipes_copy_history
    __example: "s3://my-bucket/data/"
    __description: Stage location (ACCOUNT_USAGE view-only).
  snowflake.copy.status:
    __context_names:
      - snowpipes_copy_history
    __example: LOADED
    __description: Load status.
  snowflake.copy.first_error.message:
    __context_names:
      - snowpipes_copy_history
    __example: "Number of columns in file (3) does not match that of the corresponding table (4)"
    __description: First error message for failed loads.
  snowflake.copy.first_error.line_number:
    __context_names:
      - snowpipes_copy_history
    __example: "42"
    __description: Line number of first error.
  snowflake.copy.first_error.column_name:
    __context_names:
      - snowpipes_copy_history
    __example: "AMOUNT"
    __description: Column name causing the first error.
  snowflake.copy.first_error.character_position:
    __context_names:
      - snowpipes_copy_history
    __example: "128"
    __description: Character position of first error.
  snowflake.copy.errors.limit:
    __context_names:
      - snowpipes_copy_history
    __example: "1"
    __description: Error limit for the COPY.
  snowflake.copy.pipe.received_time:
    __context_names:
      - snowpipes_copy_history
    __example: "2025-03-12 08:55:00.000 Z"
    __description: When file was received by Snowpipe (view-only).
  snowflake.copy.first_commit_time:
    __context_names:
      - snowpipes_copy_history
    __example: "2025-03-12 08:56:00.000 Z"
    __description: When the first chunk of the file was committed.
  snowflake.pipe.usage.start_time:
    __context_names:
      - snowpipes_usage_history
    __example: "2025-03-12 08:00:00.000 Z"
    __description: Start of the usage aggregation window.
dimensions:
  snowflake.pipe.name:
    __context_names:
      - snowpipes
      - snowpipes_copy_history
      - snowpipes_usage_history
    __example: MY_DB.MY_SCHEMA.MY_PIPE
    __description: Fully qualified pipe name.
  snowflake.pipe.catalog_name:
    __context_names:
      - snowpipes_copy_history
    __example: MY_DB
    __description: Database containing the pipe (from COPY_HISTORY).
  snowflake.pipe.schema_name:
    __context_names:
      - snowpipes_copy_history
    __example: MY_SCHEMA
    __description: Schema containing the pipe (from COPY_HISTORY).
  db.namespace:
    __context_names:
      - snowpipes
      - snowpipes_copy_history
      - snowpipes_usage_history
    __example: MY_DB
    __description: Database containing the target table or pipe.
  snowflake.schema.name:
    __context_names:
      - snowpipes
      - snowpipes_copy_history
      - snowpipes_usage_history
    __example: MY_SCHEMA
    __description: Schema containing the target table or pipe.
  db.collection.name:
    __context_names:
      - snowpipes
      - snowpipes_copy_history
    __example: TARGET_TABLE
    __description: Target table for ingested data.
  snowflake.pipe.owner:
    __context_names:
      - snowpipes
    __example: LOADER_ROLE
    __description: Role owning the pipe.
  snowflake.pipe.status:
    __context_names:
      - snowpipes
    __example: RUNNING
    __description: |
      Pipe execution state as original string:
      RUNNING, PAUSED, STOPPED_*, STALLED_*.
event_timestamps:
  snowflake.event.trigger:
    __context_names:
      - snowpipes
    __example: "snowflake.pipe.created_on"
    __description: Standard event trigger key.
  snowflake.pipe.created_on:
    __context_names:
      - snowpipes
    __example: "2025-01-15 10:30:00.000 Z"
    __description: Pipe creation event.
metrics:
  snowflake.pipe.files.pending:
    __context_names:
      - snowpipes
    __example: "5"
    __description: Files queued awaiting ingestion.
    displayName: Pending Files
    unit: count
  snowflake.pipe.latency.oldest_file:
    __context_names:
      - snowpipes
    __example: "12345"
    __description: Milliseconds since oldest pending file timestamp.
    displayName: Oldest File Latency
    unit: ms
  snowflake.pipe.files.ingested:
    __context_names:
      - snowpipes_copy_history
    __example: "1"
    __description: Files successfully loaded in this interval.
    displayName: Files Ingested
    unit: count
  snowflake.pipe.rows.loaded:
    __context_names:
      - snowpipes_copy_history
    __example: "1000"
    __description: Rows inserted.
    displayName: Rows Loaded
    unit: count
  snowflake.pipe.rows.parsed:
    __context_names:
      - snowpipes_copy_history
    __example: "1050"
    __description: Rows parsed.
    displayName: Rows Parsed
    unit: count
  snowflake.pipe.errors:
    __context_names:
      - snowpipes_copy_history
    __example: "0"
    __description: Files with load errors.
    displayName: Load Errors
    unit: count
  snowflake.pipe.ingest.latency:
    __context_names:
      - snowpipes_copy_history
    __example: "5000"
    __description: Per-file latency from PIPE_RECEIVED_TIME to LAST_LOAD_TIME (enabled by ACCOUNT_USAGE view).
    displayName: Ingest Latency
    unit: ms
  snowflake.copy.errors:
    __context_names:
      - snowpipes_copy_history
    __example: "2"
    __description: Error count in this load.
    displayName: Copy Errors
    unit: count
  snowflake.pipe.data.ingested:
    __context_names:
      - snowpipes_usage_history
    __example: "1048576"
    __description: Bytes inserted.
    displayName: Data Ingested
    unit: bytes
  snowflake.pipe.cost.credits_used:
    __context_names:
      - snowpipes_usage_history
    __example: "0.5"
    __description: Serverless credits consumed.
    displayName: Credits Used
    unit: count
  snowflake.pipe.files.inserted:
    __context_names:
      - snowpipes_usage_history
    __example: "10"
    __description: Files inserted (from PIPE_USAGE_HISTORY).
    displayName: Files Inserted
    unit: count
  snowflake.pipe.cost.bytes_billed:
    __context_names:
      - snowpipes_usage_history
    __example: "524288"
    __description: Bytes billed for Snowpipe usage.
    displayName: Bytes Billed
    unit: bytes
  snowflake.copy.file_size:
    __context_names:
      - snowpipes_copy_history
    __example: "102400"
    __description: Observed size of the source file before loading.
    displayName: File Size
    unit: bytes
  snowflake.copy.bytes_billed:
    __context_names:
      - snowpipes_copy_history
    __example: "51200"
    __description: Bytes billed for this copy operation.
    displayName: Copy Bytes Billed
    unit: bytes
