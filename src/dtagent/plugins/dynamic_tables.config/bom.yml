delivers:
  - name: DTAGENT_DB.APP.P_GRANT_MONITOR_DYNAMIC_TABLES()
    type: procedure
  - name: DTAGENT_DB.APP.V_DYNAMIC_TABLE_GRAPH_HISTORY_INSTRUMENTED
    type: view
  - name: DTAGENT_DB.APP.V_DYNAMIC_TABLE_REFRESH_HISTORY_INSTRUMENTED
    type: view
  - name: DTAGENT_DB.APP.V_DYNAMIC_TABLES_INSTRUMENTED
    type: view
  - name: DTAGENT_DB.CONFIG.UPDATE_DYNAMIC_TABLES_CONF()
    type: procedure
  - name: DTAGENT_DB.APP.TASK_DTAGENT_DYNAMIC_TABLES
    type: task
  - name: DTAGENT_DB.APP.TASK_DTAGENT_DYNAMIC_TABLES_GRANTS
    type: task
    comment: (Admin scope only) Admin task owned by DTAGENT_ADMIN to grant MONITOR privileges on dynamic tables

references:
  - name: SHOW DATABASES
    type: command
    privileges: USAGE
  - name: ALL DYNAMIC TABLES IN DATABASE $database
    type: dynamic table
    privileges: MONITOR
    granted to: DTAGENT_VIEWER
    comment: Granted when include pattern has wildcard schema (e.g. DB.%.%)
  - name: ALL FUTURE DYNAMIC TABLES IN DATABASE $database
    type: dynamic table
    privileges: MONITOR
    granted to: DTAGENT_VIEWER
    comment: Granted when include pattern has wildcard schema (e.g. DB.%.%)
  - name: ALL DYNAMIC TABLES IN SCHEMA $database.$schema
    type: dynamic table
    privileges: MONITOR
    granted to: DTAGENT_VIEWER
    comment: Granted when include pattern has specific schema (e.g. DB.ANALYTICS.%)
  - name: ALL FUTURE DYNAMIC TABLES IN SCHEMA $database.$schema
    type: dynamic table
    privileges: MONITOR
    granted to: DTAGENT_VIEWER
    comment: Granted when include pattern has specific schema (e.g. DB.ANALYTICS.%)
  - name: DYNAMIC TABLE $database.$schema.$table
    type: dynamic table
    privileges: MONITOR
    granted to: DTAGENT_VIEWER
    comment: Granted when include pattern specifies an exact table name (e.g. DB.ANALYTICS.ORDERS_DT); no FUTURE grant at table level
  - name: INFORMATION_SCHEMA.DYNAMIC_TABLE_REFRESH_HISTORY
    type: function
    privileges: USAGE
    granted to: DTAGENT_VIEWER
  - name: INFORMATION_SCHEMA.DYNAMIC_TABLE_GRAPH_HISTORY
    type: function
    privileges: USAGE
    granted to: DTAGENT_VIEWER
  - name: INFORMATION_SCHEMA.DYNAMIC_TABLES
    type: function
    privileges: USAGE
    granted to: DTAGENT_VIEWER
