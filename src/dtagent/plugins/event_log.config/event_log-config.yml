plugins:
  event_log:
    max_entries: 10000
    lookback_hours: 24
    retention_hours: 24
    schedule: USING CRON */30 * * * * UTC
    schedule_cleanup: USING CRON 0 * * * * UTC
    is_disabled: false
    cross_tenant_monitoring: true
    databases: []
    discover_db_event_tables: false
    telemetry:
      - metrics
      - logs
      - biz_events
      - spans
