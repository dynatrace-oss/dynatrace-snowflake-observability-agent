variables:
  - version: 2
    key: Accounts
    type: query
    visible: true
    editable: true
    multiple: true
    input: |-
      fetch logs, from: now()-7d
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | fields deployment.environment
      | dedup deployment.environment
      | sort deployment.environment asc

  - version: 2
    key: Budget
    type: query
    visible: true
    editable: true
    multiple: true
    input: |-
      fetch logs, from: now()-7d
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | filter in(deployment.environment, array($Accounts))
      | filter isNotNull(`snowflake.budget.name`)
      | fields `snowflake.budget.name`
      | dedup `snowflake.budget.name`
      | sort `snowflake.budget.name` asc

  - version: 2
    key: Warehouse
    type: query
    visible: true
