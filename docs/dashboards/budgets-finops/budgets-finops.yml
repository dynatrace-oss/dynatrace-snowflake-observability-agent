      | sort `snowflake.warehouse.name` asc

tiles:
  # ----------------------------------------------------------------
  # Section 1: Budget Analysis
  # ----------------------------------------------------------------
  "0":
    type: markdown
    content: |
      ## Budget Analysis
      Track budget credit spending versus limits across all Snowflake budgets.
      Data source: `budgets` plugin (contexts: `budgets`, `spendings`).

  "1":
    title: Budget spending vs limit
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | filter dsoa.run.context == "spendings"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.budget.name`, array($Budget))
      | filter isNotNull(`snowflake.budget.name`)
      | summarize {
          spent = sum(toDouble(`snowflake.credits.spent`))
        }, by: { `snowflake.budget.name`, deployment.environment }
      | join [
          fetch logs
          | filter db.system == "snowflake"
          | filter dsoa.run.plugin == "budgets"
          | filter dsoa.run.context == "budgets"
          | filter in(deployment.environment, array($Accounts))
          | filter in(`snowflake.budget.name`, array($Budget))
          | filter isNotNull(`snowflake.budget.name`)
          | summarize {
              limit_val = max(toDouble(`snowflake.credits.limit`))
            }, by: { `snowflake.budget.name` }
        ], on: { left[`snowflake.budget.name`] == right[`snowflake.budget.name`] }
        , fields: { limit_val }
      | fields
          `Budget`   = `snowflake.budget.name`,
          `Account`  = deployment.environment,
          `Spent`    = spent,
          `Limit`    = limit_val,
          `% Used`   = if(limit_val > 0, spent / limit_val * 100, else: 0)
      | sort `Budget` asc
    visualization: table
    visualizationSettings:
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
      thresholds:
        - id: 1
          field: "% Used"
          title: Budget usage
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: <
              label: ""
              value: 75
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: <
              label: ""
              value: 100
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: "≥"
              label: ""
              value: 100
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "2":
    title: Budget spending trend
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | filter `dsoa.run.context` == "spendings"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.budget.name`, array($Budget))
      | filter isNotNull(`snowflake.credits.spent`)
      | fieldsAdd spent_n = toDouble(`snowflake.credits.spent`)
      | makeTimeseries spent = avg(spent_n),
          by: { `snowflake.budget.name`, deployment.environment },
          time: timestamp
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Credits Spent
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - spent
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.budget.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "3":
    title: Budget spending by service type
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | filter dsoa.run.context == "spendings"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.budget.name`, array($Budget))
      | filter isNotNull(`snowflake.service.type`)
      | summarize {
          spent = sum(toDouble(`snowflake.credits.spent`))
        }, by: { `snowflake.service.type` }
      | sort spent desc
    visualization: pieChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        legend:
          position: bottom
        categoryOverrides: {}
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "4":
    title: Budget details
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "budgets"
      | filter dsoa.run.context == "budgets"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.budget.name`, array($Budget))
      | filter isNotNull(`snowflake.budget.name`)
      | sort timestamp desc
      | summarize {
          limit_val  = max(toDouble(`snowflake.credits.limit`)),
          owner      = takeLast(`snowflake.budget.owner`),
          resource   = takeLast(`snowflake.budget.resource`)
        }, by: { `snowflake.budget.name`, deployment.environment }
      | sort `snowflake.budget.name` asc
      | fields
          `Budget`         = `snowflake.budget.name`,
          `Account`        = deployment.environment,
          `Limit (Credits)` = limit_val,
          `Owner`          = owner,
          `Resources`      = resource
    visualization: table
    visualizationSettings:
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  # ----------------------------------------------------------------
  # Section 2: Warehouse Optimization
  # ----------------------------------------------------------------
  "5":
    type: markdown
    content: |
      ## Warehouse Optimization
      Review warehouse sizing, scaling policies, cluster configuration, and resource monitor quota consumption.
      Data source: `resource_monitors` plugin (context: `resource_monitors`).

  "6":
    title: Warehouse sizing overview
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "resource_monitors"
      | filter dsoa.run.context == "resource_monitors"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.warehouse.name`, array($Warehouse))
      | filter isNotNull(`snowflake.warehouse.name`)
      | sort timestamp desc
      | summarize {
          size             = takeLast(`snowflake.warehouse.size`),
          scaling_policy   = takeLast(`snowflake.warehouse.scaling_policy`),
          min_clusters     = takeLast(toLong(`snowflake.warehouse.clusters.min`)),
          max_clusters     = takeLast(toLong(`snowflake.warehouse.clusters.max`)),
          execution_state  = takeLast(`snowflake.warehouse.execution_state`),
          auto_resume      = takeLast(`snowflake.warehouse.is_auto_resume`),
          is_unmonitored   = takeLast(`snowflake.warehouse.is_unmonitored`)
        }, by: { `snowflake.warehouse.name`, deployment.environment }
      | sort `snowflake.warehouse.name` asc
      | fields
          `Warehouse`       = `snowflake.warehouse.name`,
          `Account`         = deployment.environment,
          `Size`            = size,
          `Scaling Policy`  = scaling_policy,
          `Min Clusters`    = min_clusters,
          `Max Clusters`    = max_clusters,
          `State`           = execution_state,
          `Auto Resume`     = auto_resume,
          `Unmonitored`     = is_unmonitored
    visualization: table
    visualizationSettings:
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
      thresholds:
        - id: 1
          field: Unmonitored
          title: Resource Monitor
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: =
              label: ""
              value: "false"
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: =
              label: ""
              value: "true"
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "7":
    title: Cluster utilization over time
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "resource_monitors"
      | filter `dsoa.run.context` == "resource_monitors"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.warehouse.name`, array($Warehouse))
      | filter isNotNull(`snowflake.warehouse.name`)
      | fieldsAdd started_n = toDouble(`snowflake.warehouse.clusters.started`),
                  max_n = toDouble(`snowflake.warehouse.clusters.max`)
      | makeTimeseries {
            started = avg(started_n),
            max_clusters = avg(max_n)
          },
          by: { `snowflake.warehouse.name`, deployment.environment },
          time: timestamp
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Clusters
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - started
            - max_clusters
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.warehouse.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "8":
    title: Resource monitor quota usage over time
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "resource_monitors"
      | filter `dsoa.run.context` == "resource_monitors"
      | filter in(deployment.environment, array($Accounts))
      | filter isNotNull(`snowflake.resource_monitor.name`)
      | fieldsAdd quota_used_n = toDouble(`snowflake.credits.quota.used`),
                  quota_n = toDouble(`snowflake.credits.quota`)
      | makeTimeseries {
            quota_used = avg(quota_used_n),
            quota_total = avg(quota_n)
          },
          by: { `snowflake.resource_monitor.name`, deployment.environment },
          time: timestamp
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Credits
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - quota_used
            - quota_total
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds:
        - id: 1
          field: ""
          title: Quota usage
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: ≥
              label: ""
              value: 70
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: ≥
              label: ""
              value: 30
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: <
              label: ""
              value: 30
      dataMapping:
        displayedFields:
          - snowflake.resource_monitor.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  # ----------------------------------------------------------------
  # Section 3: Warehouse Load
  # ----------------------------------------------------------------
  "9":
    type: markdown
    content: |
      ## Warehouse Load
      Monitor query concurrency, queue depth, and blocked queries per warehouse.
      Data source: `warehouse_usage` plugin (context: `warehouse_usage_load`).
      Note: `ACCOUNT_USAGE.WAREHOUSE_LOAD_HISTORY` has a ~45-180 min ingestion lag.

  "10":
    title: Running vs queued queries over time
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "warehouse_usage"
      | filter `dsoa.run.context` == "warehouse_usage_load"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.warehouse.name`, array($Warehouse))
      | filter isNotNull(`snowflake.warehouse.name`)
      | fieldsAdd running_n = toDouble(`snowflake.load.running`),
                  queued_n = toDouble(`snowflake.load.queued.overloaded`)
      | makeTimeseries {
            running = avg(running_n),
            queued  = avg(queued_n)
          },
          by: { `snowflake.warehouse.name`, deployment.environment },
          time: timestamp
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Query Count
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - running
            - queued
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.warehouse.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "11":
    title: Average running queries by warehouse
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "warehouse_usage"
      | filter dsoa.run.context == "warehouse_usage_load"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.warehouse.name`, array($Warehouse))
      | filter isNotNull(`snowflake.load.running`)
      | summarize avg_running = avg(toDouble(`snowflake.load.running`)),
          by: { `snowflake.warehouse.name` }
      | sort avg_running desc
    visualization: honeycomb
    visualizationSettings:
      honeycomb:
        shape: hexagon
        legend: auto
        dataMappings:
          value: avg_running
        displayedFields:
          - snowflake.warehouse.name
        colorMode: color-palette
        colorPalette: blue
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

  "12":
    title: Blocked queries over time
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "warehouse_usage"
      | filter `dsoa.run.context` == "warehouse_usage_load"
      | filter in(deployment.environment, array($Accounts))
      | filter in(`snowflake.warehouse.name`, array($Warehouse))
      | filter isNotNull(`snowflake.warehouse.name`)
      | fieldsAdd blocked_n = toDouble(`snowflake.load.blocked`)
      | makeTimeseries blocked = avg(blocked_n),
          by: { `snowflake.warehouse.name`, deployment.environment },
          time: timestamp
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Blocked Queries
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - blocked
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds:
        - id: 1
          field: ""
          title: Blocked queries
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: <
              label: ""
              value: 1
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: ≥
              label: ""
              value: 1
      dataMapping:
        displayedFields:
          - snowflake.warehouse.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true

