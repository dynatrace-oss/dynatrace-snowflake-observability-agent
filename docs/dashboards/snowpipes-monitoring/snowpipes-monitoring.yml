# DASHBOARD: Snowpipes Monitoring
# DESCRIPTION:  Snowpipes ingestion monitoring dashboard for DSOA
# OWNER: sebastian.kruk
# PLUGINS: snowpipes
# TAGS: snowpipes, ingestion, operations, performance
