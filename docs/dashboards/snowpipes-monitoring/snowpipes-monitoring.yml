        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - pending
            - threshold_warning
            - threshold_critical
          timestamp: timeframe
        legend:
          position: bottom
        leftYAxisSettings:
          label: Pending Files
          isLabelVisible: true
      dataMapping:
        displayedFields:
          - snowflake.pipe.name
      thresholds:
        - id: 1
          field: ""
          title: Backlog threshold
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: <
              label: ""
              value: 100
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: <
              label: ""
              value: 1000
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">="
              label: ""
              value: 1000
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "12":
    title: Data Volume Ingested
    type: data
    query: |-
      timeseries data = sum(snowflake.pipe.data.ingested), by: {
          db.namespace,
          snowflake.pipe.name,
          deployment.environment
