        leftYAxisSettings:
          label: Data Ingested
          isLabelVisible: true
      dataMapping:
        displayedFields:
          - db.namespace
      thresholds: []
      unitsOverrides:
        - identifier: data
          unitCategory: data size
          baseUnit: byte
          displayUnit: null
          decimals: 1
          suffix: ""
          delimiter: false
          added: 5
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "13":
    type: markdown
    content: "# Error Analytics"
    davis:
      componentState:
        inputData: null
  "14":
