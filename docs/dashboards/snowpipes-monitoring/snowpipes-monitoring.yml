version: 21
variables:
  - key: Accounts
    visible: true
    type: query
    version: 2
    editable: true
    input: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | fields deployment.environment
      | dedup deployment.environment
      | sort deployment.environment asc
    multiple: true
    defaultValue:
      - 3420b2ac-f1cf-4b24-b62d-61ba1ba8ed05*
  - key: Pipe
    visible: true
    type: query
    version: 2
    editable: true
    input: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter in(deployment.environment, array($Accounts))
      | fields snowflake.pipe.name
      | dedup snowflake.pipe.name
      | sort snowflake.pipe.name asc
    multiple: true
    defaultValue:
      - 3420b2ac-f1cf-4b24-b62d-61ba1ba8ed05*
  - key: Threshold_Latency_Warning
    visible: true
    type: text
    version: 2
    editable: true
    defaultValue: "300000"
  - key: Threshold_Latency_Critical
    visible: true
    type: text
    version: 2
    editable: true
    defaultValue: "1800000"
  - key: Threshold_Backlog_Warning
    visible: true
    type: text
    version: 2
    editable: true
    defaultValue: "100"
  - key: Threshold_Backlog_Critical
    visible: true
    type: text
    version: 2
    editable: true
    defaultValue: "1000"
tiles:
  "0":
    type: markdown
    content: "# Executive Overview"
    davis:
      componentState:
        inputData: null
  "1":
    title: Pipe Health
    type: data
    query: |-
      fetch events
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter in(deployment.environment, array($Accounts))
      | filter isNotNull(snowflake.pipe.status)
      | filter in(snowflake.pipe.name, array($Pipe))
      | summarize {
          status = takeLast(snowflake.pipe.status)
        }, by: { snowflake.pipe.name }
      | summarize {
          total = count(),
          running = countIf(status == "RUNNING")
        }
      | fieldsAdd pipe_health_pct = running / total * 100
      | fields pipe_health_pct
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: Pipe Health
        recordField: pipe_health_pct
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds:
        - id: 1
          field: pipe_health_pct
          title: ""
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: <
              label: ""
              value: 80
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: <
              label: ""
              value: 100
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: ">="
              label: ""
              value: 100
      unitsOverrides:
        - identifier: pipe_health_pct
          unitCategory: percentage
          baseUnit: percent
          displayUnit: null
          decimals: 1
          suffix: "%"
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "2":
    title: Credits Consumed
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_usage_history"
      | filter in(deployment.environment, array($Accounts))
      | summarize { total_credits = sum(toDouble(`snowflake.pipe.cost.credits_used`)) }
      | fields total_credits
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: Credits Consumed
        recordField: total_credits
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "3":
    title: Files Processed
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_copy_history"
      | filter in(deployment.environment, array($Accounts))
      | summarize { total_files = sum(toLong(`snowflake.pipe.files.ingested`)) }
      | fields total_files
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: Files Processed
        recordField: total_files
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "4":
    title: p95 Ingestion Latency
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_copy_history"
      | filter in(deployment.environment, array($Accounts))
      | filter isNotNull(`snowflake.pipe.ingest.latency`)
      | summarize { p95_latency = percentile(toLong(`snowflake.pipe.ingest.latency`), 95) }
      | fields p95_latency
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: p95 Ingestion Latency
        recordField: p95_latency
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds:
        - id: 1
          field: p95_latency
          title: ""
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: <
              label: ""
              value: 300000
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: <
              label: ""
              value: 1800000
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">="
              label: ""
              value: 1800000
      unitsOverrides:
        - identifier: p95_latency
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 1
          suffix: ""
          delimiter: false
          added: 2
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "5":
    title: Load Errors
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_copy_history"
      | filter in(deployment.environment, array($Accounts))
      | summarize {
          total_errors = sum(toLong(`snowflake.pipe.errors`)) + sum(toLong(`snowflake.copy.errors`))
        }
      | fields total_errors
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: Load Errors
        recordField: total_errors
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds:
        - id: 1
          field: total_errors
          title: ""
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: "="
              label: ""
              value: 0
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">"
              label: ""
              value: 0
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
