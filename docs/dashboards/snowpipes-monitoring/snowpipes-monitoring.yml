        }, by: { db.collection.name }
      | fields db.collection.name, total_errors
    visualization: honeycomb
    visualizationSettings:
      honeycomb:
        colorMode: color-palette
        colorPalette: red
        dataMappings:
          value: total_errors
        displayedFields:
          - db.collection.name
        legend:
          position: right
      thresholds: []
