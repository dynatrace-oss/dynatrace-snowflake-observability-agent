      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "15":
    title: Top Pipes by Error Count
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_copy_history"
      | filter in(deployment.environment, array($Accounts))
      | summarize {
          total_errors = sum(toLong(`snowflake.pipe.errors`)) + sum(toLong(`snowflake.copy.errors`))
        }, by: {
          snowflake.pipe.name,
          db.collection.name,
          db.namespace
        }
      | sort total_errors desc
      | limit 50
      | fields
          `Pipe` = snowflake.pipe.name,
          `Database` = db.namespace,
          `Target Table` = db.collection.name,
          `Errors` = total_errors
    visualization: table
    visualizationSettings:
      table:
        columnWidths: {}
      thresholds:
        - id: 1
          field: Errors
          title: ""
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: "="
              label: ""
              value: 0
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">"
              label: ""
              value: 0
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
