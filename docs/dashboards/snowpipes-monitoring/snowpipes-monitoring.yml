  "6":
    title: Data Ingested
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter dsoa.run.context == "snowpipes_usage_history"
      | filter in(deployment.environment, array($Accounts))
      | summarize { total_bytes = sum(toDouble(`snowflake.pipe.data.ingested`)) }
      | fields total_bytes
    visualization: singleValue
    visualizationSettings:
      singleValue:
        labelMode: custom
        label: Data Ingested
        recordField: total_bytes
        prefixIcon: ""
        trend:
          isVisible: false
      autoSelectVisualization: false
      thresholds: []
      unitsOverrides:
        - identifier: total_bytes
          unitCategory: data size
          baseUnit: byte
          displayUnit: null
          decimals: 1
          suffix: ""
          delimiter: false
          added: 3
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "7":
    type: markdown
    content: "# Pipe Health Status"
    davis:
      componentState:
        inputData: null
  "8":
    title: Pipe Status
    type: data
    query: |-
      fetch events
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "snowpipes"
      | filter in(deployment.environment, array($Accounts))
      | filter isNotNull(snowflake.pipe.status)
      | filter in(snowflake.pipe.name, array($Pipe))
      | summarize {
          status = takeLast(snowflake.pipe.status)
        }, by: { snowflake.pipe.name, deployment.environment }
      | fieldsAdd status_code = toLong(
          if(status == "RUNNING", 1,
          else: if(status == "PAUSED", 2, else: 3))
        )
      | fields snowflake.pipe.name, deployment.environment, status, status_code
    visualization: honeycomb
    visualizationSettings:
      honeycomb:
        colorMode: color-palette
        colorPalette: blue
        dataMappings:
          value: status_code
        displayedFields:
          - snowflake.pipe.name
          - status
        legend:
          position: right
      thresholds:
        - id: 1
          field: status_code
          title: Status
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: "="
              label: RUNNING
              value: 1
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: "="
              label: PAUSED
              value: 2
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">"
              label: STOPPED/STALLED
              value: 2
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "9":
    type: markdown
    content: "# Latency & Throughput"
    davis:
      componentState:
        inputData: null
  "10":
    title: Ingestion Latency by Pipe
    type: data
    query: |-
      timeseries latency = avg(snowflake.pipe.ingest.latency), by: {
          snowflake.pipe.name,
          deployment.environment
        }
      | filter in(deployment.environment, array($Accounts))
      | filter in(snowflake.pipe.name, array($Pipe))
      | fieldsAdd threshold_warning = toDouble($Threshold_Latency_Warning)
      | fieldsAdd threshold_critical = toDouble($Threshold_Latency_Critical)
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - latency
            - threshold_warning
            - threshold_critical
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
        leftYAxisSettings:
          label: Latency (ms)
          isLabelVisible: true
          min:
            mode: auto
          max:
            mode: auto
          scale: linear
      dataMapping:
        displayedFields:
          - snowflake.pipe.name
      thresholds:
        - id: 1
          field: ""
          title: Latency threshold
          isEnabled: true
          rules:
            - id: 0
              color:
                Default: "var(--dt-colors-charts-categorical-color-09-default, #649438)"
              comparator: <
              label: ""
              value: 300000
            - id: 1
              color:
                Default: "var(--dt-colors-charts-categorical-color-14-default, #d56b1a)"
              comparator: <
              label: ""
              value: 1800000
            - id: 2
              color:
                Default: "var(--dt-colors-charts-categorical-color-12-default, #cd3741)"
              comparator: ">="
              label: ""
              value: 1800000
      unitsOverrides:
        - identifier: latency
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 1
          suffix: ""
          delimiter: false
          added: 4
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 1
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
      componentState:
        inputData: null
  "11":
    title: Stage Backlog (Pending Files)
    type: data
    query: |-
      timeseries pending = sum(snowflake.pipe.files.pending), by: {
          snowflake.pipe.name,
          deployment.environment
