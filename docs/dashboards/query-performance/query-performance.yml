  "7":
    title: Query performance vs table size growth (over last 14 days)
    type: data
    query: |-
      fetch logs, from:-14d
        | filter db.system == "snowflake"
        | fieldsAdd
            snow_account = deployment.environment,
            db_collection_name = coalesce(db.collection.name, db.sql.table),
            db_name = coalesce(db.name, db.namespace), db_query = coalesce(db.statement, db.query.text)
        | filter isNotNull(snow_account)
            and (isNotNull(db_collection_name) or isNotNull(db.snowflake.tables))
            and isNotNull(snowflake.time.execution)
        | filter in(snow_account, array($Account))
        | filter in(db_name, array($DB_Name))
        | fieldsAdd db_snowflake_tables = db.snowflake.tables
        | fieldsAdd db.snowflake.tables = if(isNotNull(asArray(db_snowflake_tables)), db_snowflake_tables,
                                     else: if(isNotNull(db_snowflake_tables), parse(db_snowflake_tables, """'"' JSON_ARRAY(strict=false, typed=true):table_names '"'"""),
                                     else: array(db_collection_name)))
        | expand db.collection.name = db.snowflake.tables
        | filter in(db.collection.name, array($DB_Table))
        | fieldsAdd snowflake.time.execution = toLong(snowflake.time.execution)
        | makeTimeseries {
          avg_exec_time = avg(snowflake.time.execution)
        }, by: {
          db.collection.name
        }, interval: 24h
        | lookup [
            timeseries {
              max_row_count = max(snowflake.data.rows)
            }, by: {
              db.collection.name
            }, interval: 24h
            | filter in(db.collection.name, array($DB_Table))
        ], sourceField: db.collection.name, lookupField: db.collection.name, fields: {
          max_row_count
        }
        | filter arrayMin(max_row_count) > 0
        | fieldsAdd exec_time_by_rows = iCollectArray(avg_exec_time[] / max_row_count[])
        | fieldsRemove avg_exec_time, max_row_count
    visualization: davis
    visualizationSettings:
      autoSelectVisualization: false
      chartSettings:
        gapPolicy: connect
        circleChartSettings:
          groupingThresholdType: relative
          groupingThresholdValue: 0
          valueType: relative
        categoryOverrides: {}
        categoricalBarChartSettings:
          categoryAxis: db.sql.table
          categoryAxisLabel: db.sql.table
          valueAxis: interval
          valueAxisLabel: interval
          tooltipVariant: single
        hiddenLegendFields: []
        fieldMapping:
          timestamp: timeframe
          leftAxisValues:
            - exec_time_by_rows
        truncationMode: middle
      singleValue:
        labelMode: custom
        label: ""
        prefixIcon: ""
        recordField: db.sql.table
        autoscale: true
        alignment: center
        colorThresholdTarget: value
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
      honeycomb:
        shape: hexagon
        legend: auto
        dataMappings:
          value: interval
        displayedFields:
          - db.sql.table
        colorMode: color-palette
        colorPalette: blue
      histogram:
        dataMappings:
          - valueAxis: interval
            rangeAxis: ""
      label:
        showLabel: false
      icon:
        showIcon: false
        icon: ""
      valueBoundaries:
        min:
          mode: auto
        max:
          mode: auto
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: true
      componentState:
        selectedAnalyzerName: dt.statistics.ui.anomaly_detection.AutoAdaptiveAnomalyDetectionAnalyzer
        inputData:
          dt.statistics.ui.anomaly_detection.AutoAdaptiveAnomalyDetectionAnalyzer:
            generalParameters:
              timeframe:
                startTime: now()-24h
                endTime: now()
