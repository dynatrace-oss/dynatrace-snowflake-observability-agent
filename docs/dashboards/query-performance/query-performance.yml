id: f245f73a-35f5-4298-8158-2a8aa4611a23
version: 26
variables:
  - version: 2
    key: Account
    type: query
    visible: true
    editable: true
    input: |-
      fetch logs
        | filter db.system == "snowflake"
        | fieldsAdd snow_account = deployment.environment
        | filter isNotNull(db.user)
            and isNotNull(snow_account)
            and isNotNull(coalesce(db.name, db.namespace))
            and isNotNull(coalesce(db.statement, db.query.text))
            and isNotNull(snowflake.time.execution)
        | fields snow_account
        | dedup snow_account
        | sort snow_account
    multiple: true
  - version: 2
    key: DB_Name
    type: query
    visible: true
    editable: true
    input: |-
      fetch logs
        | filter db.system == "snowflake"
        | filter in(deployment.environment, array($Account))
        | filter isNotNull(db.user)
            and isNotNull(deployment.environment)
            and isNotNull(coalesce(db.name, db.namespace))
            and isNotNull(coalesce(db.statement, db.query.text))
            and isNotNull(snowflake.time.execution)
        | fields db_name = coalesce(db.name, db.namespace)
        | dedup db_name
        | sort db_name asc
    multiple: true
  - version: 2
    key: DB_Table
    type: query
    visible: true
    editable: true
    input: |-
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | fieldsAdd
            db_name = coalesce(db.name, db.namespace),
            db_collection_name = coalesce(db.collection.name, db.sql.table)
        | filter in(deployment.environment, array($Account))
        | filter in(db_name, array($DB_Name))
        | filter isNotNull(db.user)
            and isNotNull(deployment.environment)
            and isNotNull(db_name)
            and isNotNull(coalesce(db.statement, db.query.text))
            and (isNotNull(db_collection_name) or isNotNull(db.snowflake.tables))
        | fieldsAdd db_snowflake_tables = db.snowflake.tables
        | fieldsAdd db.snowflake.tables = if(isNotNull(asArray(db_snowflake_tables)), db_snowflake_tables,
                                     else: if(isNotNull(db_snowflake_tables), parse(db_snowflake_tables, """'"' JSON_ARRAY(strict=false, typed=true):table_names '"'"""),
                                     else: array(db_collection_name)))
        | expand db.collection.name = db.snowflake.tables
        | fields db.collection.name
        | dedup db.collection.name
        | sort db.collection.name asc
    multiple: true
  - version: 2
    key: Warehouse
    type: query
    visible: true
    editable: true
    input: |-
      fetch logs
        | filter db.system == "snowflake"
        | filter isNotNull(db.user)
            and in(deployment.environment, array($Account))
            and isNotNull(coalesce(db.name, db.namespace))
            and isNotNull(coalesce(db.statement, db.query.text))
            and isNotNull(snowflake.time.execution)
        | fields snowflake.warehouse.name
        | dedup snowflake.warehouse.name
        | sort snowflake.warehouse.name
    multiple: true
  - version: 2
    key: User
    type: query
    visible: true
    editable: true
    input: |-
      fetch logs
        | filter db.system == "snowflake"
        | fieldsAdd db_name = coalesce(db.name, db.namespace)
        | filter in(deployment.environment, array($Account))
        | filter in(db_name, array($DB_Name))
        | filter isNotNull(db.user)
            and isNotNull(deployment.environment)
            and isNotNull(coalesce(db.name, db.namespace))
            and isNotNull(coalesce(db.statement, db.query.text))
        | fields db.user
        | dedup db.user
        | sort db.user asc
    multiple: true
  - version: 2
    key: TAG_FILTER
    type: text
    visible: false
    editable: true
    defaultValue: '(":" SPACE* DIGIT{13,19})? TIME? TIMESTAMP(''yyyy-MM-dd'')? TIMESTAMP(''HH:mm:ss.S'')? ([0-9a-fA-F-]{32})? UUIDSTRING?'
  - version: 2
    key: TopN
    type: csv
    visible: false
    editable: true
    input: "5,10,20,50,100"
    multiple: false
    defaultValue: "10"
  - version: 2
    key: SlowQueryMin
    type: text
    visible: false
    editable: true
    defaultValue: "60"
tiles:
  "0":
    title: Query execution time (whole account summary)
    type: data
    query: |-
      timeseries snowflake.time.execution = sum(snowflake.time.execution), by: {
        service.name,
        deployment.environment
      }, filter: {
        in(deployment.environment, array($Account))
        and in(snowflake.warehouse.name, array($Warehouse))
      }
        | fieldsAdd service_name = coalesce(deployment.environment, service.name)
        | fieldsRemove service.name, deployment.environment
        | summarize {
          snowflake.time.execution = sum(snowflake.time.execution[])
        }, by: {
          timeframe,
          interval,
          service_name
        }
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Execution Time
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        seriesOverrides:
          - seriesId:
              - prod
            override:
              color: "#b3007d"
          - seriesId:
              - dev
            override:
              color:
                Default: "var(--dt-colors-charts-categorical-themed-swamps-color-01-default, #006650)"
        fieldMapping:
          leftAxisValues:
            - snowflake.time.execution
          timestamp: timeframe
        curve: smooth
        gapPolicy: connect
      dataMapping:
        displayedFields:
          - service_name
      coloring:
        colorRules:
          - field: DT.name
            comparator: "= *value*"
            value: ""
            type: string
            colorMode: color-palette
            colorPalette: categorical
          - field: DT.name
            comparator: "="
            value: prod
            type: string
            colorMode: custom-color
            customColor: "#b3007d"
          - field: DT.name
            comparator: "="
            value: dev
            type: string
            colorMode: custom-color
            customColor:
              Default: "var(--dt-colors-charts-categorical-themed-swamps-color-01-default, #006650)"
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "1":
    title: Query execution time per DB
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | fieldsAdd
            snow_account = deployment.environment,
            db_name = coalesce(db.name, db.namespace)
        | filter isNotNull(db.user)
            and isNotNull(snow_account)
            and isNotNull(db_name)
            and isNotNull(snowflake.time.execution)
        | filter
            in(snow_account, array($Account))
                and in(db_name, array($DB_Name))
                and in(db.user, array($User))
        | fieldsAdd snowflake.time.execution = toLong(snowflake.time.execution)
        | makeTimeseries {
          sum_exec_time = sum(snowflake.time.execution)
        }, by: {
          db_name
        }
    visualization: areaChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - sum_exec_time
          timestamp: timeframe
      unitsOverrides:
        - identifier: sum_exec_time
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1725364673933
      dataMapping:
        displayedFields:
          - db_name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
