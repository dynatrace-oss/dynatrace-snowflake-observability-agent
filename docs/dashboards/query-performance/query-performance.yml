    type: markdown
    content: |
      ## Execution Phase Breakdown
      Compilation, execution, and queued time analysis across warehouses.
    davis:
      componentState:
        inputData: null
  "9":
    title: Compilation vs execution vs queued time
    type: data
    query: |-
      timeseries
          {
          compilation = avg(snowflake.time.compilation),
          execution = avg(snowflake.time.execution),
          `queued overload` = avg(snowflake.time.queued.overload),
          `queued provisioning` = avg(snowflake.time.queued.provisioning)
          }
        , filter: {
          db.system == "snowflake" and
          in(deployment.environment, array($Account)) and
          in(snowflake.warehouse.name, array($Warehouse))
        }
        , union:true
    visualization: areaChart
    visualizationSettings:
      autoSelectVisualization: false
      chartSettings:
        truncationMode: middle
        legend:
          hidden: true
          position: bottom
        leftYAxisSettings:
          label: Time (ms)
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - compilation
            - execution
            - queued overload
            - queued provisioning
          timestamp: timeframe
        gapPolicy: connect
      dataMapping:
        displayedFields:
          - compilation
          - execution
          - queued overload
          - queued provisioning
      unitsOverrides:
        - identifier: compilation
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
        - identifier: execution
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 2
        - identifier: queued overload
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 3
        - identifier: queued provisioning
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 4
      legend:
        showLegend: false
        position: auto
        ratio: 25
