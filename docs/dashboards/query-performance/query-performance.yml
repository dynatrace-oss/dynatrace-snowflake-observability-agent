  "12":
    title: Execution time by query tag (top $TopN)
    type: data
    query: |-
      fetch logs
      | filter db.system == "snowflake"
      | filter dsoa.run.plugin == "query_history"
      | fieldsAdd snow_account = deployment.environment
      | filter in(snow_account, array($Account))
      | filter in(coalesce(db.name, db.namespace), array($DB_Name))
      | filter in(db.user, array($User))
      | filter isNotNull(snowflake.query.tag) and snowflake.query.tag != ""
      | fieldsAdd snowflake.query.tag = replacePattern(snowflake.query.tag, $TAG_FILTER, "#")
      | fieldsAdd snowflake.time.execution = toLong(snowflake.time.execution)
      | makeTimeseries {
          avg_exec_time = avg(snowflake.time.execution)
        }, by: {
          snowflake.query.tag
        }
      | fieldsAdd sum_avg_exec_time = arraySum(avg_exec_time[])
      | sort sum_avg_exec_time desc
      | limit toLong($TopN)
      | fieldsRemove sum_avg_exec_time
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        legend:
          position: bottom
        leftYAxisSettings:
          label: Avg Execution Time (ms)
          isLabelVisible: true
        xAxisLabel: timeframe
        xAxisScaling: analyzedTimeframe
        fieldMapping:
