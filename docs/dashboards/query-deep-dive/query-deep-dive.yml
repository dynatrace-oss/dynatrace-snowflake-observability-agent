id: 9dbac33a-25ba-4192-b748-c8b6fe561c3b

version: 25

variables:
  - key: Accounts
    type: query
    visible: true
    editable: true
    version: 2
    multiple: true
    input: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | summarize collectDistinct(deployment.environment)

  - key: Warehouse
    type: query
    visible: true
    editable: true
    version: 2
    multiple: true
    input: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.warehouse.name)
        | summarize collectDistinct(snowflake.warehouse.name)

  - key: Database
    type: query
    visible: true
    editable: true
    version: 2
    multiple: true
    input: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.namespace)
        | summarize collectDistinct(db.namespace)

  - key: User
    type: query
    visible: true
    editable: true
    version: 2
    multiple: true
    input: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.user)
        | summarize collectDistinct(db.user)

  - key: Operation
    type: query
    visible: true
    editable: true
    version: 2
    multiple: true
    input: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.operation.name)
