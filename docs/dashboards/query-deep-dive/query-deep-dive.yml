tiles:
  # ── Section 1: Costly Repeated Queries ─────────────────────────────────────
  "0":
    title: ""
    type: markdown
    content: |
      ## Costly Repeated Queries
      Identify query patterns (grouped by query hash) that accumulate the most bytes scanned, spill, or elapsed time across executions.
      Use these tables to target re-write or caching opportunities.

  "1":
    title: Top 20 queries by total bytes scanned
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.query.hash)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize
            total_scanned_bytes = sum(toDouble(snowflake.data.scanned)),
            exec_count          = count(),
            avg_elapsed_ms      = avg(toDouble(snowflake.time.total_elapsed)),
            query_text          = takeFirst(db.query.text),
            by: {
              query_hash = snowflake.query.hash,
              database   = db.namespace,
              warehouse  = snowflake.warehouse.name,
              operation  = db.operation.name }
        | sort total_scanned_bytes desc
        | limit 20
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: total_scanned_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000010
        - identifier: avg_elapsed_ms
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 0
          suffix: ""
          delimiter: false
          added: 1700000000011
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns:
          - query_text
        lineWrapIds: []
        columnWidths: {}
        columnOrder:
          - "[\"total_scanned_bytes\"]"
          - "[\"exec_count\"]"
          - "[\"avg_elapsed_ms\"]"
          - "[\"database\"]"
          - "[\"warehouse\"]"
          - "[\"operation\"]"
          - "[\"query_hash\"]"
          - "[\"query_text\"]"
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "2":
    title: Top 20 queries by spill volume
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.query.hash)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | fieldsAdd
            local_spill  = toDouble(snowflake.data.spilled.local),
            remote_spill = toDouble(snowflake.data.spilled.remote)
        | summarize
            total_spill_bytes  = sum(local_spill + remote_spill),
            local_spill_bytes  = sum(local_spill),
            remote_spill_bytes = sum(remote_spill),
            exec_count         = count(),
            query_text         = takeFirst(db.query.text),
            by: {
              query_hash = snowflake.query.hash,
              database   = db.namespace,
              warehouse  = snowflake.warehouse.name }
        | sort total_spill_bytes desc
        | limit 20
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: total_spill_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000020
        - identifier: local_spill_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000021
        - identifier: remote_spill_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000022
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns:
          - query_text
        lineWrapIds: []
        columnWidths: {}
        columnOrder:
          - "[\"total_spill_bytes\"]"
          - "[\"local_spill_bytes\"]"
          - "[\"remote_spill_bytes\"]"
          - "[\"exec_count\"]"
          - "[\"database\"]"
          - "[\"warehouse\"]"
          - "[\"query_hash\"]"
          - "[\"query_text\"]"
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "3":
    title: Bytes scanned over time by database
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.data.scanned)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | fieldsAdd scanned = toDouble(snowflake.data.scanned)
        | makeTimeseries scanned = sum(scanned), by: { db.namespace }
    visualizationSettings:
      autoSelectVisualization: false
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - scanned
          timestamp: timeframe
        pointsDisplay: never
        gapPolicy: connect
      unitsOverrides:
        - identifier: scanned
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000001
      thresholds: []
      dataMapping:
        displayedFields:
          - db.namespace
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 2: Table Performance Degradation ───────────────────────────────
  "4":
    title: ""
    type: markdown
    content: |
      ## Table Performance Degradation
      Monitor partition scan efficiency, spill volumes, and cache hit rates per table to identify candidates for re-clustering or optimization.

  "5":
    title: Partition scan ratio by table (avg)
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.collection.name)
        | filter isNotNull(snowflake.partitions.total)
        | filter toDouble(snowflake.partitions.total) > 0
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | fieldsAdd scan_ratio = toDouble(snowflake.partitions.scanned) / toDouble(snowflake.partitions.total)
        | makeTimeseries avg_ratio = avg(scan_ratio), by: { db.collection.name }
        | fieldsAdd sum_avg_ratio = arraySum(avg_ratio)
        | sort sum_avg_ratio desc
        | limit toLong($TopN)
        | fieldsRemove sum_avg_ratio
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        gapPolicy: connect
        fieldMapping:
          leftAxisValues:
            - avg_ratio
          timestamp: timeframe
      thresholds: []
      dataMapping:
        displayedFields:
          - db.collection.name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "6":
    title: Spill volumes by table
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.collection.name)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | makeTimeseries
            local_spill  = sum(toDouble(snowflake.data.spilled.local)),
            remote_spill = sum(toDouble(snowflake.data.spilled.remote)),
            by: { db.collection.name }
        | fieldsAdd sum_spill = arraySum(local_spill) + 100*arraySum(remote_spill)
        | sort sum_spill desc
        | limit toLong($TopN)
        | fieldsRemove sum_spill
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        gapPolicy: connect
        fieldMapping:
          leftAxisValues:
            - local_spill
            - remote_spill
          timestamp: timeframe
      unitsOverrides:
        - identifier: local_spill
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000002
        - identifier: remote_spill
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000003
      thresholds: []
      dataMapping:
        displayedFields:
          - db.collection.name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "7":
    title: Cache hit rate by table (avg %)
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(db.collection.name)
        | filter isNotNull(snowflake.data.scanned_from_cache)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | makeTimeseries cache_pct = avg(toDouble(snowflake.data.scanned_from_cache) * 100), by: { db.collection.name }
        | fieldsAdd sum_cache_pct = arraySum(cache_pct)
        | sort sum_cache_pct desc
        | limit toLong($TopN)
        | fieldsRemove sum_cache_pct
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        gapPolicy: connect
        fieldMapping:
          leftAxisValues:
            - cache_pct
          timestamp: timeframe
      unitsOverrides:
        - identifier: cache_pct
          unitCategory: percentage
          baseUnit: percent
          displayUnit: null
          decimals: null
          suffix: ""
          delimiter: false
          added: 1774519603792
      thresholds: []
      dataMapping:
        displayedFields:
          - db.collection.name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 3: Query Acceleration ─────────────────────────────────────────
  "8":
    title: ""
    type: markdown
    content: |
      ## Query Acceleration
      Find queries eligible for Snowflake's query acceleration service and track bytes being offloaded to the service.

  "9":
    title: Acceleration-eligible queries
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter snowflake.query.accel_est.status == "eligible"
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | fields
            `Query ID`                   = snowflake.query.id,
            User                         = db.user,
            Warehouse                    = snowflake.warehouse.name,
            Database                     = db.namespace,
            Operation                    = db.operation.name,
            Status                       = snowflake.query.accel_est.status,
            `Upper Limit Scale Factor`   = snowflake.query.accel_est.upper_limit_scale_factor,
            `Est. Query Times`           = snowflake.query.accel_est.estimated_query_times,
            `Elapsed Time (ms)`          = toDouble(snowflake.time.total_elapsed),
            `Query Text`                 = db.query.text
        | sort `Elapsed Time (ms)` desc
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: "Elapsed Time (ms)"
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 0
          suffix: ""
          delimiter: false
          added: 1700000000030
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "10":
    title: Acceleration bytes scanned over time by warehouse
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter toDouble(snowflake.acceleration.data.scanned) > 0
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | makeTimeseries accel_bytes = sum(toDouble(snowflake.acceleration.data.scanned)), by: { snowflake.warehouse.name }
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        gapPolicy: connect
        fieldMapping:
          leftAxisValues:
            - accel_bytes
          timestamp: timeframe
      unitsOverrides:
        - identifier: accel_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000004
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.warehouse.name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 4: Multi-level Query Analysis ─────────────────────────────────
  "11":
    title: ""
    type: markdown
    content: |
      ## Multi-level Query Analysis
      Root queries (stored procedures, scripts) that spawned child queries.
      Each row is a root span; click the **Trace** link to open the full parent-child call tree in Distributed Tracing.

  "12":
    title: Root queries with child queries
    type: data
    query: |
      fetch spans
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNull(snowflake.query.parent_id)
        | filter isNotNull(`trace.id`)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | join [
            fetch spans
              | filter db.system == "snowflake"
              | filter dsoa.run.plugin == "query_history"
              | filter isNotNull(snowflake.query.parent_id)
              | summarize child_count = count(), by: { parent_id = snowflake.query.parent_id }
          ], on: { left[snowflake.query.id] == right[parent_id] }, fields: {child_count}
        | filter isNotNull(child_count)
        | fields
            `Query Text`    = db.query.text,
            `Children`      = child_count,
            `Elapsed (ms)`  = toDouble(snowflake.time.total_elapsed),
            User            = db.user,
            Warehouse       = snowflake.warehouse.name,
            Database        = db.namespace,
            Operation       = db.operation.name,
            `Query ID`      = snowflake.query.id,
            `Trace`         = concat($TenantURL, "/ui/apps/dynatrace.distributed-traces/ui/trace/", `trace.id`),
            start_time
        | sort `Elapsed (ms)` desc
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: "Elapsed (ms)"
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 0
          suffix: ""
          delimiter: false
          added: 1700000000040
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
    querySettings:
      maxResultRecords: 200
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "13":
    title: Operator-level stats (slow queries)
    type: data
    query: |
      fetch spans
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(span.events)
        | filter not iAny(isNotNull(`span.events`[][`exception.type`]))
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(db.namespace) or in(db.namespace, array($Database)))
        | filter (isNull(db.user)      or in(db.user, array($User)))
        | fieldsAdd operator_stats = iCollectArray(
            parse(span.events[][snowflake.query.operator.stats], """JSON:stats"""))
        | filter isNotNull(operator_stats)
        | fields
            `Query ID`       = snowflake.query.id,
            `Query Text`     = db.query.text,
            `Elapsed (ms)`   = toDouble(snowflake.time.total_elapsed),
            User             = db.user,
            Database         = db.namespace,
            `Operator Stats` = operator_stats,
            `Span Events`    = span.events,
            start_time
        | sort `Elapsed (ms)` desc
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: "Elapsed (ms)"
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 0
          suffix: ""
          delimiter: false
          added: 1700000000050
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
    querySettings:
      maxResultRecords: 200
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "24":
    title: Span errors (exception events)
    type: data
    query: |
      fetch spans
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(span.events)
        | filter iAny(isNotNull(`span.events`[][`exception.type`]))
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(db.namespace) or in(db.namespace, array($Database)))
        | filter (isNull(db.user)      or in(db.user, array($User)))
        | fieldsAdd
            exception_type    = iCollectArray(`span.events`[][`exception.type`]),
            exception_message = iCollectArray(`span.events`[][`exception.message`])
        | fields
            `Query ID`          = snowflake.query.id,
            `Query Text`        = db.query.text,
            `Elapsed (ms)`      = toDouble(snowflake.time.total_elapsed),
            User                = db.user,
            Database            = db.namespace,
            `Exception Type`    = exception_type,
            `Exception Message` = exception_message,
            `Span Events`       = span.events,
            start_time
        | sort start_time desc
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: "Elapsed (ms)"
          unitCategory: time
          baseUnit: millisecond
          displayUnit: null
          decimals: 0
          suffix: ""
          delimiter: false
          added: 1700000000060
      thresholds:
        - field: "Exception Type"
          rules:
            - color: RED
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns:
          - Span Events
        lineWrapIds: []
        columnWidths: {}
    querySettings:
      maxResultRecords: 200
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 5: External Functions ──────────────────────────────────────────
  "14":
    title: ""
    type: markdown
    content: |
      ## External Functions
      Monitor invocation counts and data volumes for queries that call external (remote) functions.

  "15":
    title: External function invocations over time by warehouse
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter toDouble(snowflake.external_functions.invocations) > 0
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | makeTimeseries invocations = sum(toDouble(snowflake.external_functions.invocations)), by: { snowflake.warehouse.name }
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        xAxisScaling: analyzedTimeframe
        gapPolicy: connect
        fieldMapping:
          leftAxisValues:
            - invocations
          timestamp: timeframe
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.warehouse.name
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "16":
    title: External function data volumes by warehouse
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter toDouble(snowflake.external_functions.invocations) > 0
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize
            bytes_sent     = sum(toDouble(snowflake.external_functions.data.sent)),
            bytes_received = sum(toDouble(snowflake.external_functions.data.received)),
            rows_sent      = sum(toDouble(snowflake.external_functions.rows.sent)),
            rows_received  = sum(toDouble(snowflake.external_functions.rows.received)),
            invocations    = sum(toDouble(snowflake.external_functions.invocations)),
            by: { warehouse = snowflake.warehouse.name, database = db.namespace }
        | sort invocations desc
    visualization: table
    visualizationSettings:
      unitsOverrides:
        - identifier: bytes_sent
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000070
        - identifier: bytes_received
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1700000000071
      thresholds: []
      table:
        rowDensity: condensed
        enableSparklines: false
        hiddenColumns: []
        lineWrapIds: []
        columnWidths: {}
        columnOrder:
          - "[\"bytes_sent\"]"
          - "[\"bytes_received\"]"
          - "[\"rows_sent\"]"
          - "[\"rows_received\"]"
          - "[\"invocations\"]"
          - "[\"warehouse\"]"
          - "[\"database\"]"
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 6: Query Origin & Security ─────────────────────────────────────
  "17":
    title: ""
    type: markdown
    content: |
      ## Query Origin & Security
      Analyze who is running queries, how they authenticated, and which client applications are issuing requests.
      Supports anomalous-access investigation and security forensics.

  "18":
    title: Queries by client application
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(client.application.id)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize count = count(), by: { client.application.id }
        | sort count desc
    visualization: pieChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        legend:
          position: bottom
        circleChartSettings:
          valueType: relative
          groupingThresholdType: relative
      thresholds: []
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "19":
    title: Queries by authentication type
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(authentication.type)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize count = count(), by: { authentication.type }
        | sort count desc
    visualization: pieChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        legend:
          position: bottom
        circleChartSettings:
          valueType: relative
          groupingThresholdType: relative
      thresholds: []
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  # ── Section 7: Cost Attribution & Data Transfer ────────────────────────────
  "20":
    title: ""
    type: markdown
    content: |
      ## Cost Attribution & Data Transfer
      Attribute cloud services credits to specific users, roles, and warehouses.
      Track inbound and outbound cross-region data transfer volumes to monitor egress costs.

  "21":
    title: Cloud services credits by user and role (top 10)
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.credits.cloud_services)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize
            credits = sum(toDouble(snowflake.credits.cloud_services)),
            by: { db.user, snowflake.role.name }
        | sort credits desc
        | limit 10
    visualization: treemap
    visualizationSettings:
      autoSelectVisualization: false
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "22":
    title: Cloud services credits by warehouse
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter isNotNull(snowflake.credits.cloud_services)
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize
            credits = sum(toDouble(snowflake.credits.cloud_services)),
            by: { snowflake.warehouse.name }
        | sort credits desc
    visualization: donutChart
    visualizationSettings:
      autoSelectVisualization: false
      chartSettings:
        circleChartSettings:
          groupingThresholdType: number-of-slices
          groupingThresholdValue: 10
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

  "23":
    title: Cross-region data transfer by region and cloud
    type: data
    query: |
      fetch logs
        | filter db.system == "snowflake"
        | filter dsoa.run.plugin == "query_history"
        | filter toDouble(snowflake.data.transferred.inbound) > 0
            or toDouble(snowflake.data.transferred.outbound) > 0
        | filter in(deployment.environment, array($Accounts))
        | filter (isNull(snowflake.warehouse.name) or in(snowflake.warehouse.name, array($Warehouse)))
        | filter (isNull(db.namespace)             or in(db.namespace, array($Database)))
        | filter (isNull(db.user)                  or in(db.user, array($User)))
        | filter (isNull(db.operation.name)        or in(db.operation.name, array($Operation)))
        | summarize
            inbound_bytes  = sum(toDouble(snowflake.data.transferred.inbound)),
            outbound_bytes = sum(toDouble(snowflake.data.transferred.outbound)),
            by: {
              snowflake.query.data_transfer.outbound.region,
              snowflake.query.data_transfer.outbound.cloud,
              snowflake.query.data_transfer.inbound.region,
              snowflake.query.data_transfer.inbound.cloud
            }
        | sort outbound_bytes desc
    visualization: treemap
    visualizationSettings:
      autoSelectVisualization: false
    querySettings:
      maxResultRecords: 100
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 50
      defaultSamplingRatio: 10
      enableSampling: false
    davis:
      enabled: false

