# DASHBOARD: Snowflake Consumption (Organization Level)
# DESCRIPTION: Organization-wide Snowflake consumption monitoring — credits, storage, data
#              transfer, billing amounts, and remaining contract balance across all accounts.
# OWNER: DSOA Team
# PLUGINS: org_costs
# TAGS: costs, org, billing, finops
#
id: 6881ff48-0945-4e94-94af-2e4bb338724e
version: 3
name: Snowflake Consumption (Organization Level)
variables:
  - version: 2
    key: Accounts
    type: query
    visible: true
    editable: true
    multiple: true
    input: |-
      fetch logs
      | filter db.system == "snowflake" and dsoa.run.plugin == "org_costs"
      | summarize by: {deployment.environment}
      | fields account = deployment.environment
  - version: 2
    key: credit_rate
    type: text
    visible: false
    editable: true
    defaultValue: "3.00"
  - version: 2
    key: bu_mapping
    type: text
    visible: false
    editable: true
    defaultValue: "{}"
tiles:
  # ── Section 1: Contract Capacity KPIs ─────────────────────────────────────
  "14":
    type: markdown
    content: "## Contract Capacity KPIs"
    davis:
      componentState:
        inputData: null
  "15":
    title: Capacity Used (USD)
    type: data
    query: |-
      timeseries amount = sum(snowflake.org.billing.amount),
        filter: in(deployment.environment, array($Accounts))
      | summarize total = sum(arraySum(amount))
    visualization: singleValue
    visualizationSettings:
      singleValue:
        label: Capacity Used (USD)
        autoscale: true
        alignment: center
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "16":
    title: Remaining Capacity (USD)
    type: data
    query: |-
      timeseries cap = avg(snowflake.org.billing.capacity_balance),
        rollover = avg(snowflake.org.billing.rollover_balance),
        filter: in(deployment.environment, array($Accounts))
      | summarize remaining = last(arrayAvg(cap)) + last(arrayAvg(rollover))
    visualization: singleValue
    visualizationSettings:
      singleValue:
        label: Remaining Capacity (USD)
        autoscale: true
        alignment: center
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "17":
    title: 30-Day Run Rate (USD)
    type: data
    query: |-
      timeseries amount = sum(snowflake.org.billing.amount),
        from: now()-30d,
        filter: in(deployment.environment, array($Accounts))
      | summarize run_rate = sum(arraySum(amount))
    visualization: singleValue
    visualizationSettings:
      singleValue:
        label: 30-Day Run Rate (USD)
        autoscale: true
        alignment: center
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "18":
    title: YoY Burn Rate — Current vs Previous 30 Days (USD)
    type: data
    query: |-
      timeseries current = sum(snowflake.org.billing.amount),
        from: now()-30d, to: now(),
        filter: in(deployment.environment, array($Accounts))
      | summarize current_usd = sum(arraySum(current))
      | fieldsAdd previous_usd = 0.0
      | append [
        timeseries prev = sum(snowflake.org.billing.amount),
          from: now()-60d, to: now()-30d,
          filter: in(deployment.environment, array($Accounts))
        | summarize previous_usd = sum(arraySum(prev))
        | fieldsAdd current_usd = 0.0
      ]
      | summarize current_usd = sum(current_usd), previous_usd = sum(previous_usd)
      | fieldsAdd yoy_annualized_current = current_usd * 12,
                  yoy_annualized_previous = previous_usd * 12,
                  pct_change = if(previous_usd > 0, (current_usd - previous_usd) / previous_usd * 100, else: 0.0)
      | fields current_usd, previous_usd, yoy_annualized_current, yoy_annualized_previous, pct_change
    visualization: table
    visualizationSettings:
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "19":
    title: Estimated Days to Overage
    type: data
    query: |-
      timeseries cap = avg(snowflake.org.billing.capacity_balance),
        rollover = avg(snowflake.org.billing.rollover_balance),
        from: now()-30d,
        filter: in(deployment.environment, array($Accounts))
      | summarize
          balance_start = first(arrayAvg(cap)) + first(arrayAvg(rollover)),
          balance_end   = last(arrayAvg(cap))  + last(arrayAvg(rollover))
      | fieldsAdd monthly_burn = balance_start - balance_end
      | fieldsAdd days_to_overage = if(monthly_burn > 0, balance_end / monthly_burn * 30, else: -1)
      | fields days_to_overage
    visualization: singleValue
    visualizationSettings:
      singleValue:
        label: Est. Days to Overage
        autoscale: true
        alignment: center
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "20":
    title: Projected Overage Date
    type: data
    query: |-
      timeseries cap = avg(snowflake.org.billing.capacity_balance),
        rollover = avg(snowflake.org.billing.rollover_balance),
        from: now()-30d,
        filter: in(deployment.environment, array($Accounts))
      | summarize
          balance_start = first(arrayAvg(cap)) + first(arrayAvg(rollover)),
          balance_end   = last(arrayAvg(cap))  + last(arrayAvg(rollover))
      | fieldsAdd monthly_burn = balance_start - balance_end
      | fieldsAdd days_to_overage = if(monthly_burn > 0, balance_end / monthly_burn * 30, else: -1)
      | fieldsAdd projected_overage_date = if(days_to_overage > 0, formatTimestamp(now() + toTimespan(concat(toString(toLong(days_to_overage)), "d"))), else: "No overage projected")
      | fields projected_overage_date
    visualization: table
    visualizationSettings:
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  # ── Section 2: Credit Consumption ──────────────────────────────────────────
  "0":
    type: markdown
    content: "## Credit Consumption"
    davis:
      componentState:
        inputData: null
  "1":
    title: Credits Used Over Time by Account
    type: data
    query: |-
      timeseries credits = sum(snowflake.org.credits.used),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Credits
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - credits
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "2":
    title: Credits by Service Type
    type: data
    query: |-
      timeseries credits = sum(snowflake.org.credits.used),
        by: {snowflake.service.type},
        filter: in(deployment.environment, array($Accounts))
      | summarize total = sum(arrayAvg(credits)), by: {snowflake.service.type}
      | sort total desc
    visualization: barChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Credits
          isLabelVisible: true
        categoricalBarChartSettings:
          categoryAxis: snowflake.service.type
          categoryAxisLabel: Service Type
          valueAxis: total
          valueAxisLabel: Credits
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "3":
    title: Total Credits by Account
    type: data
    query: |-
      timeseries compute = sum(snowflake.org.credits.compute),
        cloud = sum(snowflake.org.credits.cloud_services),
        total = sum(snowflake.org.credits.used),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
      | summarize compute = sum(arrayAvg(compute)), cloud = sum(arrayAvg(cloud)), total = sum(arrayAvg(total)), by: {deployment.environment}
      | sort total desc
    visualization: table
    visualizationSettings:
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
