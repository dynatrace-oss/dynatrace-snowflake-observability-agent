# DASHBOARD: Snowflake Consumption (Organization Level)
# DESCRIPTION: Organization-wide Snowflake consumption monitoring — credits, storage, data
#              transfer, billing amounts, and remaining contract balance across all accounts.
# OWNER: DSOA Team
# PLUGINS: org_costs
# TAGS: costs, org, billing, finops
#
id: 6881ff48-0945-4e94-94af-2e4bb338724e
version: 2
name: Snowflake Consumption (Organization Level)
variables:
  - version: 2
    key: Accounts
    type: query
    visible: true
    editable: true
    multiple: true
    input: |-
      fetch logs
      | filter db.system == "snowflake" and dsoa.run.plugin == "org_costs"
      | summarize by: {deployment.environment}
      | fields account = deployment.environment
  - version: 2
    key: credit_rate
    type: text
    visible: false
    editable: true
    defaultValue: "3.00"
  - version: 2
    key: bu_mapping
    type: text
    visible: false
    editable: true
    defaultValue: "{}"
tiles:
  # ── Section 2: Credit Consumption ──────────────────────────────────────────
  "0":
    type: markdown
    content: "## Credit Consumption"
    davis:
      componentState:
        inputData: null
  "1":
    title: Credits Used Over Time by Account
    type: data
    query: |-
      timeseries credits = sum(snowflake.org.credits.used),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Credits
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - credits
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "2":
    title: Credits by Service Type
    type: data
    query: |-
      timeseries credits = sum(snowflake.org.credits.used),
        by: {snowflake.service.type},
        filter: in(deployment.environment, array($Accounts))
      | summarize total = sum(arrayAvg(credits)), by: {snowflake.service.type}
      | sort total desc
    visualization: barChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Credits
          isLabelVisible: true
        categoricalBarChartSettings:
          categoryAxis: snowflake.service.type
          categoryAxisLabel: Service Type
          valueAxis: total
          valueAxisLabel: Credits
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "3":
    title: Total Credits by Account
    type: data
    query: |-
      timeseries compute = sum(snowflake.org.credits.compute),
        cloud = sum(snowflake.org.credits.cloud_services),
        total = sum(snowflake.org.credits.used),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
      | summarize compute = sum(arrayAvg(compute)), cloud = sum(arrayAvg(cloud)), total = sum(arrayAvg(total)), by: {deployment.environment}
      | sort total desc
    visualization: table
    visualizationSettings:
      thresholds: []
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  # ── Section 4: Storage ─────────────────────────────────────────────────────
  "4":
    type: markdown
    content: "## Storage"
    davis:
      componentState:
        inputData: null
  "5":
    title: Storage Over Time by Account
    type: data
    query: |-
      timeseries bytes = avg(snowflake.org.storage.bytes),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Storage
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - bytes
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - deployment.environment
      unitsOverrides:
        - identifier: bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "6":
    title: Storage by Type
    type: data
    query: |-
      timeseries bytes = avg(snowflake.org.storage.bytes),
        by: {snowflake.storage.type},
        filter: in(deployment.environment, array($Accounts))
      | summarize total = sum(arrayAvg(bytes)), by: {snowflake.storage.type}
    visualization: barChart
    visualizationSettings:
      chartSettings:
        truncationMode: middle
        leftYAxisSettings:
          label: Storage
          isLabelVisible: true
        categoricalBarChartSettings:
          categoryAxis: snowflake.storage.type
          categoryAxisLabel: Storage Type
          valueAxis: total
          valueAxisLabel: Storage
      thresholds: []
      unitsOverrides:
        - identifier: total
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "7":
    title: Total Storage by Account
    type: data
    query: |-
      timeseries bytes = avg(snowflake.org.storage.bytes),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
      | summarize total_bytes = sum(arrayAvg(bytes)), by: {deployment.environment}
      | sort total_bytes desc
    visualization: table
    visualizationSettings:
      thresholds: []
      unitsOverrides:
        - identifier: total_bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  # ── Section 5: Data Transfer ───────────────────────────────────────────────
  "8":
    type: markdown
    content: "## Data Transfer"
    davis:
      componentState:
        inputData: null
  "9":
    title: Transfer Over Time by Account
    type: data
    query: |-
      timeseries bytes = sum(snowflake.org.transfer.bytes),
        by: {deployment.environment},
        filter: in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Transfer
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - bytes
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - deployment.environment
      unitsOverrides:
        - identifier: bytes
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "10":
    title: Transfer by Region
    type: data
    query: |-
      timeseries bytes = sum(snowflake.org.transfer.bytes),
        by: {snowflake.transfer.source.cloud, snowflake.transfer.source.region, snowflake.transfer.target.cloud, snowflake.transfer.target.region},
        filter: in(deployment.environment, array($Accounts))
      | summarize total = sum(arrayAvg(bytes)), by: {snowflake.transfer.source.cloud, snowflake.transfer.source.region, snowflake.transfer.target.cloud, snowflake.transfer.target.region}
      | sort total desc
    visualization: table
    visualizationSettings:
      thresholds: []
      unitsOverrides:
        - identifier: total
          unitCategory: data
          baseUnit: byte
          displayUnit: null
          decimals: 2
          suffix: ""
          delimiter: false
          added: 1
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  # ── Section 6: Billing & Contract Balance ──────────────────────────────────
  "11":
    type: markdown
    content: "## Billing & Contract Balance"
    davis:
      componentState:
        inputData: null
  "12":
    title: Billing Amount by Service
    type: data
    query: |-
      timeseries val = sum(snowflake.org.billing.amount), by: {
          snowflake.service.type,
          snowflake.account.name,
          deployment.environment
      }
      | filter in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Billing Amount
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - val
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - snowflake.service.type
          - snowflake.account.name
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
  "13":
    title: Remaining Contract Balance
    type: data
    query: |-
      timeseries {
          free_usage   = avg(snowflake.org.billing.free_usage_balance),
          capacity     = avg(snowflake.org.billing.capacity_balance),
          on_demand    = avg(snowflake.org.billing.on_demand_consumption),
          rollover     = avg(snowflake.org.billing.rollover_balance),
          overage      = avg(snowflake.org.billing.overage)
      }, by: {
          deployment.environment
      }
      | filter in(deployment.environment, array($Accounts))
    visualization: lineChart
    visualizationSettings:
      chartSettings:
        leftYAxisSettings:
          label: Remaining Balance ($)
          isLabelVisible: true
        xAxisScaling: analyzedTimeframe
        fieldMapping:
          leftAxisValues:
            - free_usage
            - capacity
            - on_demand
            - rollover
            - overage
          timestamp: timeframe
        gapPolicy: connect
        legend:
          position: bottom
      thresholds: []
      dataMapping:
        displayedFields:
          - deployment.environment
    querySettings:
      maxResultRecords: 1000
      defaultScanLimitGbytes: 500
      maxResultMegaBytes: 100
    davis:
      enabled: false
      davisVisualization:
        isAvailable: true
