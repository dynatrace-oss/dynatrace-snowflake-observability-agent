# WORKFLOW: DSOA — Org Contract Balance Warning
# DESCRIPTION: Monitors organization-level remaining contract balance and alerts when any balance
#              category drops below a configurable threshold
# OWNER: DSOA Team
# PLUGINS: org_costs
# TAGS: snowflake, dsoa, operations, costs, billing, org, finops

id: b3f2a1e4-7c8d-4e9f-a0b1-c2d3e4f5a6b7
title: "DSOA — Org Contract Balance Warning"
description: |
  Monitors organization-level remaining Snowflake contract balances (free usage, capacity,
  on-demand, rollover, and total) and sends an alert when any balance drops below a threshold.
  Requires the org_costs plugin with the org_billing_remaining_balance context enabled and
  access to SNOWFLAKE.ORGANIZATION_USAGE.
isPrivate: false
schemaVersion: 4
trigger:
  schedule:
    isActive: true
    trigger:
      type: interval
      intervalMinutes: 360
    rule: null
    filterParameters: {}
    timezone: UTC
    inputs: {}
tasks:
  check_balance:
    name: check_balance
    description: Query remaining org contract balances and fire alerts if below threshold
    action: dynatrace.automations:run-javascript
    active: true
    position:
      x: 0
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      script: |
        import { metricsClient } from '@dynatrace-sdk/client-metrics';

        // Threshold below which to trigger an alert (in USD or contract currency)
        const BALANCE_THRESHOLD = 1000;
        const METRIC_IDS = [
          'snowflake.org.balance.free_usage.remaining',
          'snowflake.org.balance.capacity.remaining',
          'snowflake.org.balance.on_demand.remaining',
          'snowflake.org.balance.rollover.remaining',
          'snowflake.org.balance.total.remaining',
        ];

        export default async function () {
          const alerts = [];

          for (const metricId of METRIC_IDS) {
            const result = await metricsClient.query({
              metricSelector: `${metricId}:last`,
              resolution: 'Inf',
              from: 'now-7d',
            });

            const dimDefs = result?.resolution?.dimensionDefinitions ?? [];
            const series = result?.resolution?.series ?? [];
            for (const s of series) {
              const latestValue = s.values?.at(-1);
              if (latestValue !== null && latestValue < BALANCE_THRESHOLD) {
                const dimensions = Object.fromEntries(
                  dimDefs.map((d, i) => [d.name, s.dimensionValues?.[i] ?? ''])
                );
                alerts.push({
                  metric: metricId,
                  value: latestValue,
                  threshold: BALANCE_THRESHOLD,
                  dimensions,
                });
              }
            }
          }

          if (alerts.length > 0) {
            console.log(`CONTRACT BALANCE ALERT: ${alerts.length} metric(s) below threshold ${BALANCE_THRESHOLD}`);
          } else {
            console.log('All org contract balances are above threshold.');
          }

          return { hasAlerts: alerts.length > 0, alerts };
        }

  ingest_balance_events:
    name: ingest_balance_events
    description: Ingest a Dynatrace event for each org contract balance that dropped below threshold
    action: dynatrace.automations:run-javascript
    active: true
    position:
      x: 0
      y: 2
    conditions:
      states:
        check_balance: OK
      custom: "{{ result('check_balance').hasAlerts == true }}"
    predecessors:
      - check_balance
    input:
      script: |
        import { execution } from '@dynatrace-sdk/automation-utils';
        import { eventsClient } from '@dynatrace-sdk/client-classic-environment-v2';

        export default async function ({ execution_id }) {
          const ex = await execution(execution_id);
          const { alerts } = await ex.result('check_balance');

          let successCount = 0;
          const failed = [];
          for (const a of alerts) {
            const dimProps = Object.fromEntries(
              Object.entries(a.dimensions).map(([k, v]) => [k, String(v)])
            );
            const eventBody = {
              body: {
                eventType: 'CUSTOM_ALERT',
                title: `Org contract balance below threshold: ${a.metric}`,
                timeout: 360,
                properties: {
                  'event.description':
                    `Balance for ${a.metric} is ${a.value.toFixed(2)}, ` +
                    `below threshold ${a.threshold}.`,
                  'ad.source': 'dsoa.org_contract_balance_warning',
                  'ad.source_metric': a.metric,
                  'balance.value': String(a.value.toFixed(2)),
                  'balance.threshold': String(a.threshold),
                  ...dimProps,
                },
              },
            };
            const res = await eventsClient.createEvent(eventBody);
            if (res.reportCount !== 1) {
              failed.push({ reason: 'Invalid number of ingested events', metric: a.metric });
            } else {
              const status = res.eventIngestResults[0];
              if (status.status === 'OK') {
                successCount += 1;
              } else {
                failed.push({ status: JSON.stringify(status), metric: a.metric });
              }
            }
          }
          if (successCount > 0) console.log(`Successfully ingested ${successCount} event(s)`);
          if (failed.length > 0) console.log(`Failed to ingest ${failed.length} event(s):`, JSON.stringify(failed));
          return alerts;
        }
