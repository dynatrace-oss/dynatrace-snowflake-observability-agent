# WORKFLOW: DSOA — Security Anomaly Detection
# DESCRIPTION: Detects abnormal login patterns, session counts, query volumes, and data scan sizes per user and table using Davis AI
# OWNER: DSOA Team
# PLUGINS: login_history, query_history
# TAGS: snowflake, dsoa, security, anomaly-detection

id: 92952e4d-56c6-3855-8f8d-f3ab04e5682f
title: "DSOA — Security Anomaly Detection"
description: |
  Monitors Snowflake login activity, session counts, query volumes, and data scan sizes using
  Davis AI Seasonal Baseline anomaly detection. Alerts when any user or table deviates
  significantly from its learned behavioral baseline — detecting compromised accounts, runaway
  service accounts, or abnormal data access patterns. Six parallel analyzers cover both
  user-level and table-level dimensions. Requires the login_history and query_history plugins.
isPrivate: false
schemaVersion: 4
trigger:
  schedule:
    isActive: true
    trigger:
      type: interval
      intervalMinutes: 360
    rule: null
    filterParameters: {}
    timezone: UTC
    inputs: {}
tasks:
  ad_user_logins:
    name: ad_user_logins
    description: Detect abnormal login count per user using Davis AI Seasonal Baseline
    action: dynatrace.davis.workflow.actions:davis-analyze
    active: true
    position:
      x: -2
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          fetch logs
          | filter dsoa.run.plugin == "login_history"
          | filter isNotNull(db.user)
          // Optional: scope to specific users
          // | filter db.user IN ("SVC_ETL", "SVC_ANALYTICS")
          // Optional: scope to specific environments
          // | filter deployment.environment == "PROD"
          | makeTimeseries count(), by: {
            db.user,
            deployment.environment
          }
          | fieldsAdd
              metric_name = "snowflake.login.count",
              _event_name_template = "Abnormal login count for user {dims:db.user} at Snowflake {dims:deployment.environment}",
              _event_description_template = "Detected abnormal login activity by user {dims:db.user} at Snowflake {dims:deployment.environment}. Login count has exceeded the learned seasonal baseline.",
              _event_category = "login",
              _event_direction = "above"
        tolerance: 1.5
        slidingWindow: 2
        violatingSamples: 1
        dealertingSamples: 2
        alertCondition: ABOVE
        alertOnMissingData: true
        useModelCache: true
        extendedOutput: false
        generalParameters:
          timeframe:
            startTime: now-1d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: false
        trainingTimeframe:
          startTime: now-30d
          endTime: now-1d

