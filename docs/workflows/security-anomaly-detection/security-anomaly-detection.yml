          endTime: now-1d

  ad_queries_by_table:
    name: ad_queries_by_table
    description: Detect abnormal query count per table using Davis AI Seasonal Baseline
    action: dynatrace.davis.workflow.actions:davis-analyze
    active: true
    position:
      x: 1
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          fetch logs
          | filter dsoa.run.plugin == "query_history"
          | filter
              isNotNull(db.collection.name)
                  or isNotNull(db.snowflake.tables)
          | fieldsAdd
              db_snowflake_tables = if(isNotNull(db.snowflake.tables), db.snowflake.tables, else: array(db.collection.name))
          | expand db.collection.name = db_snowflake_tables
          // Optional: scope to specific databases or schemas
          // | filter startsWith(db.collection.name, "PROD_DB.")
          // | filter contains(db.collection.name, ".ETL.")
          | makeTimeseries count(), by: {
            db.collection.name,
            deployment.environment
          }
          | limit 500
          | fieldsAdd
              metric_name = "snowflake.query.count",
              _event_name_template = "Abnormal query count on table {dims:db.collection.name} at Snowflake {dims:deployment.environment}",
              _event_description_template = "Detected abnormal number of queries on table {dims:db.collection.name} at Snowflake {dims:deployment.environment}. Query count has exceeded the learned seasonal baseline.",
              _event_category = "query_count",
              _event_direction = "above"
        tolerance: 5
        slidingWindow: 2
        violatingSamples: 1
        dealertingSamples: 2
        alertCondition: ABOVE
        alertOnMissingData: false
        useModelCache: true
        extendedOutput: false
        generalParameters:
          timeframe:
            startTime: now-1d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: false
        trainingTimeframe:
          startTime: now-30d
          endTime: now-1d

  ad_scanned_bytes_user:
