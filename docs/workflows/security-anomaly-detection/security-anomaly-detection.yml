    position:
      x: 0
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          fetch logs
          | filter dsoa.run.plugin == "query_history"
          | filter isNotNull(db.user)
          // Optional: scope to specific users
          // | filter db.user IN ("SVC_ETL", "SVC_ANALYTICS")
          // Optional: scope to specific environments
          // | filter deployment.environment == "PROD"
          | makeTimeseries count(), by: {
            db.user,
            deployment.environment
          }
          | fieldsAdd
              metric_name = "snowflake.query.count",
              _event_name_template = "Abnormal query count for user {dims:db.user} at Snowflake {dims:deployment.environment}",
              _event_description_template = "Detected abnormal number of queries executed by user {dims:db.user} at Snowflake {dims:deployment.environment}. Query count has exceeded the learned seasonal baseline.",
              _event_category = "query_count",
              _event_direction = "above"
        tolerance: 4
        slidingWindow: 2
        violatingSamples: 1
        dealertingSamples: 2
        alertCondition: ABOVE
        alertOnMissingData: true
        useModelCache: true
        extendedOutput: false
        generalParameters:
          timeframe:
            startTime: now-1d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: false
