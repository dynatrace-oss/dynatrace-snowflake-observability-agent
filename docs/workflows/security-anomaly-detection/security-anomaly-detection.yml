    action: dynatrace.davis.workflow.actions:davis-analyze
    active: true
    position:
      x: 2
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          fetch logs
          | filter dsoa.run.plugin == "query_history"
          | filter isNotNull(db.user)
          | filter isNotNull(snowflake.data.scanned)
          // Optional: scope to specific users
          // | filter db.user IN ("SVC_ETL", "SVC_ANALYTICS")
          // Optional: scope to specific environments
          // | filter deployment.environment == "PROD"
          | makeTimeseries sum(toLong(snowflake.data.scanned) / 1000), by: {
            db.user,
            deployment.environment
          }
          | fieldsAdd
              metric_name = "snowflake.data.scanned",
              _event_name_template = "Abnormal data scan volume for user {dims:db.user} at Snowflake {dims:deployment.environment}",
              _event_description_template = "Detected abnormal amount of data scanned by user {dims:db.user} at Snowflake {dims:deployment.environment}. Scanned bytes have exceeded the learned seasonal baseline.",
              _event_category = "data_scan",
              _event_direction = "above"
        tolerance: 4
        slidingWindow: 2
        violatingSamples: 1
        dealertingSamples: 2
        alertCondition: ABOVE
        alertOnMissingData: false
        useModelCache: true
        extendedOutput: false
        generalParameters:
          timeframe:
            startTime: now-1d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: true
        trainingTimeframe:
          startTime: now-30d
          endTime: now-1d

