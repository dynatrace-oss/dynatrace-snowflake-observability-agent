          // Optional: scope to specific environments
          // | filter deployment.environment == "PROD"
          | makeTimeseries count(), by: {
            db.user,
            deployment.environment
          }
          | fieldsAdd
              metric_name = "snowflake.session.count",
              _event_name_template = "Abnormal session count for user {dims:db.user} at Snowflake {dims:deployment.environment}",
              _event_description_template = "Detected abnormal number of sessions started by user {dims:db.user} at Snowflake {dims:deployment.environment}. Session count has exceeded the learned seasonal baseline.",
              _event_category = "session",
              _event_direction = "above"
        tolerance: 1.5
        slidingWindow: 2
        violatingSamples: 1
        dealertingSamples: 2
        alertCondition: ABOVE
        alertOnMissingData: true
        useModelCache: true
        extendedOutput: false
        generalParameters:
          timeframe:
            startTime: now-1d
            endTime: now
          logVerbosity: WARNING
