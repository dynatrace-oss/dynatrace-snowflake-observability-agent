# WORKFLOW: DSOA — Data Volume Anomaly Detection
# DESCRIPTION: Detects abnormal spikes and drops in table row counts using Davis AI anomaly detection
# OWNER: DSOA Team
# PLUGINS: data_volume
# TAGS: snowflake, dsoa, quality, data-volume

id: bbce8c69-4a7b-4fc5-a0dc-386908a51d40
title: "DSOA — Data Volume Anomaly Detection"
description: |
  Monitors row count changes per Snowflake table using Davis AI anomaly detection.
  Detects both unexpected spikes (bulk loads, data duplication) and drops (failed pipelines,
  accidental deletes, dropped tables) relative to the learned seasonal baseline. Missing data
  from any table is also treated as a potential drop anomaly. Requires the data_volume plugin.
isPrivate: false
schemaVersion: 4
trigger:
  schedule:
    isActive: true
    trigger:
      type: interval
      intervalMinutes: 720
    rule: null
    filterParameters: {}
    timezone: UTC
    inputs: {}
tasks:
  detect_volume_spike:
    name: detect_volume_spike
    description: Detect abnormal row count spikes per table using Davis AI
    action: dynatrace.davis.workflow.actions:davis-analyze
    active: true
    position:
      x: -1
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          timeseries row_count = max(snowflake.data.rows)
          , by: {
            db.collection.name,
            deployment.environment
          }
          , interval: 24h
          | fieldsAdd row_count_avg = arrayAvg(row_count)
          | fieldsAdd row_count_diff = row_count[] - row_count_avg
          // Uncomment to scope to specific databases:
          // | filter db.collection.name startsWith "PROD_DB"
          // Uncomment to scope to specific schemas:
          // | filter contains(db.collection.name, ".ETL.")
          // Uncomment to scope to specific table name patterns:
          // | filter matchesPhrase(db.collection.name, "FACT_")
          | fieldsRemove row_count_avg, row_count_diff
          | fieldsAdd
              metric_name = "snowflake.data.rows",
              _event_direction = "above",
              _event_name_template = "Abnormal data volume spike for table {dims:db.collection.name}",
              _event_description_template =
                "Table {dims:db.collection.name} in {dims:deployment.environment} has experienced"
                + " an abnormal spike in row count compared to the learned baseline."
        alertCondition: ABOVE
        tolerance: 4
        generalParameters:
          timeframe:
            startTime: now()-30d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: false
        slidingWindow: 5
        violatingSamples: 3
        dealertingSamples: 5
        alertOnMissingData: false

  detect_volume_drop:
    name: detect_volume_drop
    description: Detect unexpected drops or disappearance of table row counts using Davis AI
    action: dynatrace.davis.workflow.actions:davis-analyze
    active: true
    position:
      x: 1
      y: 1
    conditions:
      states: {}
    predecessors: []
    input:
      analyzerName: dt.statistics.anomaly_detection.SeasonalBaselineAnomalyDetectionAnalyzer
      body:
        timeSeriesData: |
          timeseries row_count = max(snowflake.data.rows)
          , by: {
            db.collection.name,
            deployment.environment
          }
          , interval: 24h
          | fieldsAdd row_count_avg = arrayAvg(row_count)
          | fieldsAdd row_count_diff = row_count[] - row_count_avg
          // Uncomment to scope to specific databases:
          // | filter db.collection.name startsWith "PROD_DB"
          // Uncomment to scope to specific schemas:
          // | filter contains(db.collection.name, ".ETL.")
          // Uncomment to scope to specific table name patterns:
          // | filter matchesPhrase(db.collection.name, "FACT_")
          | fieldsRemove row_count_avg, row_count_diff
          | fieldsAdd
              metric_name = "snowflake.data.rows",
              _event_direction = "below",
              _event_name_template = "Abnormal data volume drop for table {dims:db.collection.name}",
              _event_description_template =
                "Table {dims:db.collection.name} in {dims:deployment.environment} has experienced"
                + " an unexpected drop in row count. This may indicate a failed pipeline,"
                + " accidental delete, or dropped table."
        alertCondition: BELOW
        tolerance: 3
        generalParameters:
          timeframe:
            startTime: now()-30d
            endTime: now
          logVerbosity: WARNING
          resolveDimensionalQueryData: false
        slidingWindow: 3
        violatingSamples: 2
        dealertingSamples: 3
        alertOnMissingData: true

  extract_anomaly_events:
    name: extract_anomaly_events
    description: Process Davis results and build Dynatrace event objects
    action: dynatrace.automations:run-javascript
    active: true
    position:
      x: 0
      y: 2
    conditions:
      states:
        detect_volume_spike: SUCCESS
        detect_volume_drop: SUCCESS
    predecessors:
      - detect_volume_spike
      - detect_volume_drop
    input:
      script: |
        import { execution } from '@dynatrace-sdk/automation-utils';
        import { EventIngestEventType } from '@dynatrace-sdk/client-classic-environment-v2';

        // === CONFIGURATION ===
        // Change eventType to EventIngestEventType.CustomAlert to enable Davis problem correlation.
        // CustomInfo (default) creates informational events without triggering Davis problems.
        const CONFIG = {
          eventType: EventIngestEventType.CustomInfo,
          eventTimeout: 360,
          adSource: 'dsoa.data_volume_anomaly'
        };
        // === END CONFIGURATION ===

        function replacePlaceholders(contentString, data) {
          const pattern = /\{dims:(\S*?)}/gm;
          let matches = [];
          while ((matches = pattern.exec(contentString))) {
            contentString = contentString.replace(matches[0], data[matches[1]]);
          }
          return contentString;
        }

        function unpackMap(amap) {
          const mappedResult = {};
          amap.forEach(item => {
            mappedResult[item.key] = item.value;
          });
          return mappedResult;
        }

        function createEventObject(alert, result, events) {
          const startTime = alert.timeframe.startTime;
          const endTime = alert.timeframe.endTime;
          const eventTitle = result.dimensions.find(x => x.key === '_event_name_template')?.value;
          const eventDesc = result.dimensions.find(x => x.key === '_event_description_template')?.value;
          const sourceMetric = result.dimensions.find(x => x.key === 'metric_name')?.value;
          const direction = result.dimensions.find(x => x.key === '_event_direction')?.value;
          const resultDimensions = unpackMap(result.dimensions);

          const newEvent = {
            body: {
              eventType: CONFIG.eventType,
              title: replacePlaceholders(eventTitle, resultDimensions),
              properties: {
                'event.description': replacePlaceholders(eventDesc, resultDimensions)
              },
              timeout: CONFIG.eventTimeout
            }
          };

          newEvent.body.properties['event.start'] = startTime;
          newEvent.body.properties['event.end'] = endTime;
          newEvent.body.properties['ad.source'] = CONFIG.adSource;
          newEvent.body.properties['ad.source_metric'] = sourceMetric;
          if (direction) {
            newEvent.body.properties['ad.direction'] = direction;
          }

          if (result.dimensions.length > 0) {
            result.dimensions.forEach(dim => {
              if (!dim.key.startsWith('_')) {
                newEvent.body.properties[dim.key] = dim.value;
              }
            });
          }
          events.push(newEvent);
        }

        export default async function ({ execution_id }) {
          const ex = await execution(execution_id);
          const spikeResult = await ex.result('detect_volume_spike');
          const dropResult  = await ex.result('detect_volume_drop');

          const events = [];
          for (const analyzerResult of [spikeResult, dropResult]) {
            if (analyzerResult?.output?.length > 0) {
              analyzerResult.output.forEach(result => {
                if (result.raisedAlerts?.length > 0) {
                  result.raisedAlerts.forEach(alert => {
                    createEventObject(alert, result, events);
                  });
                }
              });
            }
          }

          console.log(`Extracted ${events.length} anomaly event(s)`);
          return events;
        }

  ingest_anomaly_events:
    name: ingest_anomaly_events
    description: Ingest anomaly events via Dynatrace Environment V2 API
    action: dynatrace.automations:run-javascript
    active: true
    position:
      x: 0
      y: 3
    conditions:
      states:
        extract_anomaly_events: OK
    predecessors:
      - extract_anomaly_events
    input:
      script: |
        import { execution } from '@dynatrace-sdk/automation-utils';
        import { eventsClient } from '@dynatrace-sdk/client-classic-environment-v2';

        async function ingestEvents(events) {
          let successCount = 0;
          const failed = [];
          for (let i = 0; i < events.length; ++i) {
            const res = await eventsClient.createEvent(events[i]);
            if (res.reportCount !== 1) {
              failed.push({ reason: 'Invalid number of ingested events' });
            } else {
              const status = res.eventIngestResults[0];
              if (status.status === 'OK') {
                successCount += 1;
              } else {
                failed.push(JSON.stringify(status));
              }
            }
          }
          if (successCount === 0 && failed.length === 0) {
            console.log('No events to ingest');
          }
          if (successCount > 0) {
            console.log(`Successfully ingested ${successCount} event(s)`);
          }
          if (failed.length > 0) {
            console.log(`Failed to ingest ${failed.length} event(s):`, JSON.stringify(failed));
          }
        }

        export default async function ({ execution_id }) {
          const ex = await execution(execution_id);
          const events = await ex.result('extract_anomaly_events');
          await ingestEvents(events);
          return events;
        }
