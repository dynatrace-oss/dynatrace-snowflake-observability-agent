core:
  dynatrace_tenant_address: abc12345.live.dynatrace.com
  deployment_environment: TEST
  log_level: WARN
  tag: ""
  procedure_timeout: 3600

  snowflake:
    # Snowflake account identifier in the format: orgname-accountname (preferred)
    # Example: myorg-myaccount
    # Legacy format (account locator) also supported: myaccount.region
    # See: https://docs.snowflake.com/en/user-guide/admin-account-identifier
    #
    # RECOMMENDED: Provide account_name for best performance (avoids SQL query at startup)
    # OPTIONAL: Set to "-" to auto-detect via Snowflake query (adds ~100ms startup time)
    account_name: "-"

    # Snowflake host name (optional - can be derived from account_name)
    # If not provided or set to "-", will be automatically derived
    # Format: <account_identifier>.snowflakecomputing.com
    # Example: myorg-myaccount.snowflakecomputing.com
    host_name: "-"

    database:
      name: "" # Default: DTAGENT_DB
      data_retention_time_in_days: 1

    warehouse:
      name: "" # Default: DTAGENT_WH

    resource_monitor:
      name: "" # Default: DTAGENT_RS, use "-" to skip
      credit_quota: 5

    roles:
      owner: "" # Default: DTAGENT_OWNER
      admin: "" # Default: DTAGENT_ADMIN, use "-" to skip
      viewer: "" # Default: DTAGENT_VIEWER

    api_integration:
      name: "" # Default: DTAGENT_API_INTEGRATION
agent:
  gc_collect_interval: 100  # GC interval in number of processed entries; overrides otel.performance.gc_interval (default: 100)
  memory_tracking_enabled: false  # Emit dsoa.agent.memory.peak_rss metric after each plugin run (default: false)
otel:
  performance:
    gc_interval: 100  # Garbage collection interval in number of processed entries (default: 100)
    spans_batch_flush_size: 50  # Flush spans/metrics every N rows in _process_span_rows (default: 50)
    logs_batch_flush_size: 100  # Flush events/metrics/logs every N entries in _log_entries (default: 100)
plugins:
  disabled_by_default: false
  deploy_disabled_plugins: true
  resource_monitors:
    credits_quota_thresholds:
      # Default alert bands (% of quota used). Monotonically increasing, all values in (0, 100].
      defaults: [50, 80, 90, 100]
      # Per-monitor overrides — key is UPPERCASE resource monitor name.
      # Example:
      #   PROD_ANALYTICS_MONITOR: [70, 85, 95, 100]
      overrides: {}
      # Minutes between ACTIVE keep-alive events while quota remains in an alert band.
      active_keepalive_timeout_minutes: 60
  self_monitoring:
    send_bizevents_on_deploy: true
    send_bizevents_on_run: true
  query_history:
    max_entries: 0
    max_lookback_minutes: 120
    include_warehouses: []
    exclude_warehouses:
      - DTAGENT_WH
    include_databases: []
    exclude_databases: []
    include_users: []
    exclude_users: []
